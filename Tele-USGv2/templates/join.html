<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Meeting | Tele-USG</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dash-body">

  <!-- 🔹 Top Bar -->
  <div class="topbar">
    <div class="brand">Tele-USG</div>
    <div class="userbar">
      <span id="userName">Loading...</span>
      <button id="logoutBtn" class="btn small">Logout</button>
    </div>
  </div>

  <!-- 🔹 Main Layout -->
  <div class="join-layout">
    <!-- === Left: Camera Preview === -->
    <div class="video-section">
      <div class="video-preview">
        <video id="cameraPreview" autoplay playsinline></video>
        <div class="camera-placeholder" id="cameraPlaceholder">Kamera off</div>
      </div>

      <!-- Controls under preview -->
      <div class="camera-controls">
        <button class="icon-btn" id="toggleMic">
          <img src="/static/img/Mic.png" alt="Mic" class="ctrl-icon" />
        </button>
        <button class="icon-btn" id="toggleCam">
          <img src="/static/img/Icon.png" alt="Camera" class="ctrl-icon" />
        </button>
        <select id="cameraSelect" class="camera-select"></select>
      </div>
    </div>

    <!-- === Right: Join Panel === -->
    <div class="join-side">
      <h3>Join Meeting</h3>

      <!-- Room ID + tombol Paste sejajar -->
      <div class="input-group">
        <input type="text" id="roomId" placeholder="Masukkan Room ID" required />
        <button type="button" id="pasteBtn" class="pwd-toggle" title="Tempel Room ID">
          <img src="/static/img/Paste.png" alt="Paste" class="eye-icon" />
        </button>
      </div>

      <button id="joinBtn" class="btn primary">Join</button>
      <button id="backBtn" class="btn danger">Back</button>
      <p id="joinMsg" class="msg"></p>
    </div>
  </div>

  <script type="module" src="/static/js/join.js"></script>
</body>
</html>
