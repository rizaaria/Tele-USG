<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <title>Login | Tele-USG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/global.css">
  <link rel="stylesheet" href="/static/css/login.css">
</head>

<body class="auth-body">
  <div class="auth-card">
    <h1>Hello!</h1>

    <form id="loginForm" autocomplete="off">
      <div class="input-group">
        <input id="loginEmail" type="text" placeholder="Email" required>
      </div>

      <div class="input-group">
        <input id="loginPassword" type="password" placeholder="Password" required>
        <button type="button" class="pwd-toggle" data-target="loginPassword">
          <img src="/static/img/Eye Hidden.png" class="eye-icon">
        </button>
      </div>

      <button id="loginBtn" class="btn primary" type="submit">Login</button>
      <button type="button" class="btn secondary" onclick="location.href='/register'">Sign up</button>
      <p id="loginMsg" class="msg"></p>
    </form>
  </div>

  <script type="module" src="/static/js/login.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
