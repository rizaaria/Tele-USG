<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Tele-USG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/register.css">
</head>

<body class="auth-body">
    <div class="auth-card">
        <h1>Sign up</h1>

        <form id="registerForm" autocomplete="off">
            <div class="input-group">
                <input id="regName" type="text" placeholder="Nama" required>
            </div>

            <div class="input-group">
                <input id="regEmail" type="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input id="regPassword" type="password" placeholder="Password" required>
                <button type="button" class="pwd-toggle" data-target="regPassword">
                    <img src="/static/img/Eye Hidden.png" class="eye-icon">
                </button>
            </div>

            <div class="input-group">
                <input id="regPassword2" type="password" placeholder="Confirm Password" required>
                <button type="button" class="pwd-toggle" data-target="regPassword2">
                    <img src="/static/img/Eye Hidden.png" class="eye-icon">
                </button>
            </div>

            <button id="registerBtn" class="btn primary" type="submit">Sign up</button>
            <button type="button" class="btn secondary" onclick="location.href='/login'">Login</button>
            <p id="registerMsg" class="msg"></p>
        </form>
    </div>

    <script type="module" src="/static/js/register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
