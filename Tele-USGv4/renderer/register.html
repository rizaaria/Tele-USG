<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Sign Up | Tele-USG</title>

  <!-- Bootstrap -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <!-- Global CSS -->
  <link rel="stylesheet" href="/static/css/global.css">

  <!-- Register-only CSS -->
  <link rel="stylesheet" href="/static/css/register.css">
</head>

<body class="auth-body">

  <div class="auth-card">
    <h1>Sign up</h1>

    <form id="registerForm" autocomplete="off">

      <!-- Name -->
      <div class="input-group">
        <input id="regName" type="text" placeholder="Nama" required>
      </div>

      <!-- Email -->
      <div class="input-group">
        <input id="regEmail" type="email" placeholder="Email" required>
      </div>

      <!-- Password -->
      <div class="input-group">
        <input id="regPassword" type="password" placeholder="Password" required>
        <button type="button" class="pwd-toggle" data-target="regPassword">
          <img src="/static/img/Eye off.png" class="eye-icon">
        </button>
      </div>

      <!-- Confirm Password -->
      <div class="input-group">
        <input id="regPassword2" type="password" placeholder="Confirm Password" required>
        <button type="button" class="pwd-toggle" data-target="regPassword2">
          <img src="/static/img/Eye off.png" class="eye-icon">
        </button>
      </div>

      <!-- Buttons -->
      <button id="registerBtn" class="btn primary" type="submit">
        Sign up
      </button>

      <button 
        type="button" 
        class="btn secondary" 
        onclick="location.href='/login'">
        Login
      </button>

      <p id="registerMsg" class="msg"></p>
    </form>

  </div>

  <!-- Scripts -->
  <script type="module" src="/static/js/register.js"></script>
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
