<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Tele-USG</title>
  <link rel="stylesheet" href="/static/css/dashboard.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="dash-body">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="brand">Tele-USG</div>
    <div class="userbar">
      <span id="userName">Loading...</span>
      <button id="logoutBtn" class="btn small">Logout</button>
    </div>
  </div>

  <!-- Dashboard Container -->
  <div class="dash-container">
    <h2>Welcome!</h2>

    <!-- Dua tombol sejajar -->
    <div class="menu-row">
      <div class="menu-card" onclick="goto('create')">
        <h3>Create Meeting</h3>
      </div>    

      <div class="menu-card" onclick="goto('join')">
        <h3>Join Meeting</h3>
      </div>
    </div>

    <!-- Tombol Data Pasien di bawah center -->
    <div class="menu-center">
      <div class="menu-card" onclick="goto('patients')">
        <h3>Data Pasien</h3>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
